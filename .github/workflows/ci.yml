name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  backend-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Set up Python 3.11
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Compile backend modules
        run: |
          python -m py_compile api/main.py
          python -m py_compile api/model_loader.py
          python -m py_compile api/db.py
          python -m py_compile api/schemas.py
          python -m py_compile api/routes/predict.py
          python -m py_compile api/routes/history.py
          python -m py_compile api/routes/model_info.py
          echo "✓ Backend syntax OK"

  frontend-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Set up Node 20
        uses: actions/setup-node@v3
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Build frontend
        run: npm run build

      - name: Check build success
        run: echo "✓ Frontend build OK"
